name: Supabase Keep-Alive

on:
  schedule:
    - cron: '0 8 */3 * *'  # every 3 days at 08:00 UTC
  workflow_dispatch:         # allow manual trigger

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping Supabase
        run: |
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
            "https://xoalkspcwkwvhgmgakgo.supabase.co/rest/v1/products?limit=1" \
            -H "apikey: ${{ secrets.SUPABASE_PUBLISHABLE_KEY }}" \
            -H "Authorization: Bearer ${{ secrets.SUPABASE_PUBLISHABLE_KEY }}")
          echo "Response status: $STATUS"
          if [ "$STATUS" -lt 200 ] || [ "$STATUS" -ge 500 ]; then
            echo "Ping failed with status $STATUS"
            exit 1
          fi
          echo "Supabase is alive."
